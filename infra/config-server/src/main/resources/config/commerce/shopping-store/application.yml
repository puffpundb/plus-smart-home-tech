spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_home_tech_db?currentSchema=shopping_store
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        default_schema: shopping_store
    hibernate:
      ddl-auto: validate
    show-sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql