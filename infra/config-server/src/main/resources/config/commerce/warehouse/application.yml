spring:
  datasource:
#    url: jdbc:postgresql://localhost:5432/smart_home_tech_db?currentSchema=warehouse
    url: jdbc:postgresql://localhost:5432/smart_home_tech_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
#    properties:
#      hibernate:
#        default_schema: warehouse
    hibernate:
      ddl-auto: update
    show-sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never