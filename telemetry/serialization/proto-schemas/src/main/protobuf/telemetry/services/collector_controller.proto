syntax = "proto3";

package ru.yandex.practicum.telemetry.services;

option java_multiple_files = true;
option java_package = "ru.yandex.practicum.grpc.telemetry.collector";

import "telemetry/messages/sensor_event.proto";
import "telemetry/messages/hub_event.proto";
import "google/protobuf/empty.proto";

service CollectorController {
    rpc CollectSensorEvent (.ru.yandex.practicum.telemetry.messages.SensorEventProto) returns (google.protobuf.Empty);
    rpc CollectHubEvent (.ru.yandex.practicum.telemetry.messages.HubEventProto) returns (google.protobuf.Empty);
}